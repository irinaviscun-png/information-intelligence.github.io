<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 200" width="1000" height="200">
  <!-- Shield with stripes -->
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C10404;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield background -->
  <path d="M 60 30 L 100 30 L 100 120 Q 100 150 80 170 Q 60 150 60 120 Z" fill="url(#shieldGradient)" stroke="#C10404" stroke-width="2"/>
  
  <!-- Stripes on shield -->
  <line x1="65" y1="30" x2="65" y2="130" stroke="white" stroke-width="3" opacity="0.8"/>
  <line x1="72" y1="30" x2="72" y2="130" stroke="white" stroke-width="3" opacity="0.8"/>
  <line x1="79" y1="30" x2="79" y2="130" stroke="white" stroke-width="3" opacity="0.8"/>
  <line x1="86" y1="30" x2="86" y2="130" stroke="white" stroke-width="3" opacity="0.8"/>
  <line x1="93" y1="30" x2="93" y2="130" stroke="white" stroke-width="3" opacity="0.8"/>
  
  <!-- Star on shield -->
  <g transform="translate(80, 75)">
    <polygon points="0,-12 3,-4 12,-4 5,2 8,11 0,5 -8,11 -5,2 -12,-4 -3,-4" fill="white"/>
  </g>
  
  <!-- Stony Brook University text -->
  <text x="140" y="70" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#222222">
    Stony Brook
  </text>
  <text x="140" y="110" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#C10404">
    University
  </text>
  
  <!-- AI Innovation Institute text -->
  <text x="620" y="70" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#222222">
    AI Innovation
  </text>
  <text x="620" y="110" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#222222">
    Institute
  </text>
</svg>